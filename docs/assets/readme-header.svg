<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="titleGrad" gradientUnits="userSpaceOnUse" x1="380" y1="0" x2="820" y2="0">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#22d3ee"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-420 0;420 0;-420 0" dur="7s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="traceGrad" gradientUnits="userSpaceOnUse" x1="200" y1="0" x2="480" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="traceGradR" gradientUnits="userSpaceOnUse" x1="1000" y1="0" x2="720" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6d28d9" stop-opacity="0.35"/>
      <stop offset="0.6" stop-color="#2563eb" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#0a0e17" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    .mono { font-family: 'JetBrains Mono','Fira Code',Consolas,'Courier New',monospace; }
    .title { font-weight: 800; font-size: 64px; letter-spacing: 6px; }
    .brand { font-weight: 700; font-size: 20px; letter-spacing: 14px; fill: #7dd3fc; }
    .sub   { font-size: 14px; letter-spacing: 5px; fill: #8b9cc0; }
    .boot  { font-size: 13px; fill: #4ade80; }
    .chipT { font-weight: 700; font-size: 17px; fill: #86efac; letter-spacing: 2px; }
    .chipS { font-size: 10px; fill: #64748b; letter-spacing: 1px; }
    .stat  { font-size: 11.5px; fill: #94a3b8; letter-spacing: 1.5px; }
    .hud   { stroke: #22d3ee; stroke-width: 2; fill: none; opacity: .7; }
    .mesh  { stroke: #1c3252; stroke-width: 1; }
    .gridl { stroke: #12233d; stroke-width: 1; }
    .flow  { stroke-dasharray: 5 9; animation: dashf 1.4s linear infinite; }
    .flowS { stroke-dasharray: 3 7; animation: dashf 2.2s linear infinite; }
    @keyframes dashf { to { stroke-dashoffset: -140; } }
    .blink { animation: blinkk 1.1s steps(2,start) infinite; }
    @keyframes blinkk { to { visibility: hidden; } }
    .scan  { animation: scanmove 7s linear infinite; }
    @keyframes scanmove { from { transform: translateY(-30px);} to { transform: translateY(440px);} }
    .fadeSlow { animation: pulseo 5s ease-in-out infinite; }
    @keyframes pulseo { 0%,100% { opacity:.55 } 50% { opacity:1 } }
  </style>

  <!-- ===== latar ===== -->
  <rect width="1200" height="430" fill="#0a0e17"/>
  <ellipse cx="600" cy="215" rx="560" ry="260" fill="url(#coreGlow)"/>

  <!-- grid perspektif bawah -->
  <g opacity="0.55">
    <line class="gridl" x1="0" y1="336" x2="1200" y2="336"/>
    <line class="gridl" x1="0" y1="352" x2="1200" y2="352"/>
    <line class="gridl" x1="0" y1="372" x2="1200" y2="372"/>
    <line class="gridl" x1="0" y1="398" x2="1200" y2="398"/>
    <line class="gridl" x1="600" y1="330" x2="600" y2="430"/>
    <line class="gridl" x1="500" y1="330" x2="420" y2="430"/>
    <line class="gridl" x1="700" y1="330" x2="780" y2="430"/>
    <line class="gridl" x1="400" y1="330" x2="220" y2="430"/>
    <line class="gridl" x1="800" y1="330" x2="980" y2="430"/>
    <line class="gridl" x1="300" y1="330" x2="30" y2="430"/>
    <line class="gridl" x1="900" y1="330" x2="1170" y2="430"/>
  </g>

  <!-- ===== neural mesh atas ===== -->
  <g>
    <path class="mesh" d="M60 96 L190 52 L330 92 L470 44 L600 78 L730 40 L870 88 L1010 50 L1140 94"/>
    <path class="mesh" d="M190 52 L330 20 L470 44 M730 40 L870 18 L1010 50"/>
    <path class="mesh" d="M60 96 L150 130 L330 92 M1140 94 L1050 128 L870 88"/>
    <path class="mesh" d="M470 44 L600 20 L730 40"/>
    <g fill="#38bdf8">
      <circle cx="60"  cy="96" r="3"><animate attributeName="r" values="2.5;4.5;2.5" dur="3s"   repeatCount="indefinite"/></circle>
      <circle cx="190" cy="52" r="3"><animate attributeName="r" values="2.5;4.5;2.5" dur="2.6s" begin=".4s" repeatCount="indefinite"/></circle>
      <circle cx="330" cy="92" r="3"><animate attributeName="r" values="2.5;4.5;2.5" dur="3.4s" begin=".8s" repeatCount="indefinite"/></circle>
      <circle cx="470" cy="44" r="3"><animate attributeName="r" values="2.5;4.5;2.5" dur="2.8s" begin=".2s" repeatCount="indefinite"/></circle>
      <circle cx="600" cy="78" r="3.5" fill="#a78bfa"><animate attributeName="r" values="3;5.5;3" dur="2.4s" repeatCount="indefinite"/></circle>
      <circle cx="730" cy="40" r="3"><animate attributeName="r" values="2.5;4.5;2.5" dur="3.1s" begin=".6s" repeatCount="indefinite"/></circle>
      <circle cx="870" cy="88" r="3"><animate attributeName="r" values="2.5;4.5;2.5" dur="2.7s" begin="1s"  repeatCount="indefinite"/></circle>
      <circle cx="1010" cy="50" r="3"><animate attributeName="r" values="2.5;4.5;2.5" dur="3.3s" begin=".3s" repeatCount="indefinite"/></circle>
      <circle cx="1140" cy="94" r="3"><animate attributeName="r" values="2.5;4.5;2.5" dur="2.9s" begin=".7s" repeatCount="indefinite"/></circle>
      <circle cx="330" cy="20" r="2.2" fill="#22d3ee"/><circle cx="870" cy="18" r="2.2" fill="#22d3ee"/>
      <circle cx="600" cy="20" r="2.2" fill="#22d3ee"/><circle cx="150" cy="130" r="2.2" fill="#22d3ee"/>
      <circle cx="1050" cy="128" r="2.2" fill="#22d3ee"/>
    </g>
    <!-- paket data mengalir di mesh -->
    <circle r="2.6" fill="#22d3ee" filter="url(#softGlow)">
      <animateMotion dur="5s" repeatCount="indefinite" path="M60 96 L190 52 L330 92 L470 44 L600 78"/>
    </circle>
    <circle r="2.6" fill="#a78bfa" filter="url(#softGlow)">
      <animateMotion dur="5.5s" begin="1.2s" repeatCount="indefinite" path="M1140 94 L1010 50 L870 88 L730 40 L600 78"/>
    </circle>
    <circle r="2.2" fill="#4ade80" filter="url(#softGlow)">
      <animateMotion dur="4.2s" begin="2s" repeatCount="indefinite" path="M330 20 L470 44 L600 20 L730 40 L870 18"/>
    </circle>
  </g>

  <!-- ===== bracket HUD sudut ===== -->
  <path class="hud" d="M26 26 h44 M26 26 v44"/>
  <path class="hud" d="M1174 26 h-44 M1174 26 v44"/>
  <path class="hud" d="M26 404 h44 M26 404 v-44"/>
  <path class="hud" d="M1174 404 h-44 M1174 404 v-44"/>

  <!-- ===== chip GPU kiri ===== -->
  <g transform="translate(58,152)">
    <g stroke="#134e2a" stroke-width="1.5">
      <line x1="18" y1="-8" x2="18" y2="0"/><line x1="42" y1="-8" x2="42" y2="0"/>
      <line x1="66" y1="-8" x2="66" y2="0"/><line x1="90" y1="-8" x2="90" y2="0"/>
      <line x1="114" y1="-8" x2="114" y2="0"/><line x1="138" y1="-8" x2="138" y2="0"/>
      <line x1="18" y1="92" x2="18" y2="100"/><line x1="42" y1="92" x2="42" y2="100"/>
      <line x1="66" y1="92" x2="66" y2="100"/><line x1="90" y1="92" x2="90" y2="100"/>
      <line x1="114" y1="92" x2="114" y2="100"/><line x1="138" y1="92" x2="138" y2="100"/>
    </g>
    <rect width="156" height="92" rx="10" fill="#0d1526" stroke="#16a34a" stroke-width="1.6">
      <animate attributeName="stroke-opacity" values="1;.35;1" dur="2.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="13" y="12" width="130" height="44" rx="6" fill="#081018" stroke="#123f24"/>
    <text x="78" y="41" text-anchor="middle" class="mono chipT">L40S</text>
    <text x="78" y="76" text-anchor="middle" class="mono chipS">GPU-0 · 46GB · sm_89</text>
    <circle cx="140" cy="14" r="3" fill="#22c55e" filter="url(#softGlow)">
      <animate attributeName="opacity" values="1;.2;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ===== chip GPU kanan ===== -->
  <g transform="translate(986,152)">
    <g stroke="#134e2a" stroke-width="1.5">
      <line x1="18" y1="-8" x2="18" y2="0"/><line x1="42" y1="-8" x2="42" y2="0"/>
      <line x1="66" y1="-8" x2="66" y2="0"/><line x1="90" y1="-8" x2="90" y2="0"/>
      <line x1="114" y1="-8" x2="114" y2="0"/><line x1="138" y1="-8" x2="138" y2="0"/>
      <line x1="18" y1="92" x2="18" y2="100"/><line x1="42" y1="92" x2="42" y2="100"/>
      <line x1="66" y1="92" x2="66" y2="100"/><line x1="90" y1="92" x2="90" y2="100"/>
      <line x1="114" y1="92" x2="114" y2="100"/><line x1="138" y1="92" x2="138" y2="100"/>
    </g>
    <rect width="156" height="92" rx="10" fill="#0d1526" stroke="#16a34a" stroke-width="1.6">
      <animate attributeName="stroke-opacity" values="1;.35;1" dur="2.6s" begin="1.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="13" y="12" width="130" height="44" rx="6" fill="#081018" stroke="#123f24"/>
    <text x="78" y="41" text-anchor="middle" class="mono chipT">L40S</text>
    <text x="78" y="76" text-anchor="middle" class="mono chipS">GPU-1 · 46GB · sm_89</text>
    <circle cx="140" cy="14" r="3" fill="#22c55e" filter="url(#softGlow)">
      <animate attributeName="opacity" values="1;.2;1" dur="1.6s" begin=".8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- sirkuit chip -> inti -->
  <g fill="none" stroke-width="1.6">
    <path class="flow"  d="M214 176 H286 L316 198 H392" stroke="url(#traceGrad)"/>
    <path class="flowS" d="M214 220 H274 L304 242 H372" stroke="url(#traceGrad)" opacity=".7"/>
    <path class="flow"  d="M986 176 H914 L884 198 H808" stroke="url(#traceGradR)"/>
    <path class="flowS" d="M986 220 H926 L896 242 H828" stroke="url(#traceGradR)" opacity=".7"/>
  </g>

  <!-- ===== inti: judul ===== -->
  <g text-anchor="middle">
    <text x="600" y="172" class="mono brand">U N I S M U H</text>
    <text x="600" y="238" class="mono title" fill="url(#titleGrad)" filter="url(#glow)">COMPUTEHUB</text>
    <text x="600" y="272" class="mono sub">⟢ GPU ORCHESTRATION · DEEP LEARNING · HPC ⟣</text>
    <text x="600" y="300" class="mono boot fadeSlow">&gt; initializing compute_core .......... [ OK ]<tspan class="blink">▊</tspan></text>
  </g>

  <!-- ===== status HUD bawah ===== -->
  <g transform="translate(0,330)">
    <g transform="translate(232,0)">
      <rect width="178" height="30" rx="15" fill="#0d1526" stroke="#1e3a5f"/>
      <circle cx="20" cy="15" r="4" fill="#22c55e"><animate attributeName="opacity" values="1;.25;1" dur="1.4s" repeatCount="indefinite"/></circle>
      <text x="34" y="19.5" class="mono stat">SCHEDULER ONLINE</text>
    </g>
    <g transform="translate(424,0)">
      <rect width="150" height="30" rx="15" fill="#0d1526" stroke="#1e3a5f"/>
      <circle cx="20" cy="15" r="4" fill="#76b900"><animate attributeName="opacity" values="1;.25;1" dur="1.4s" begin=".3s" repeatCount="indefinite"/></circle>
      <text x="34" y="19.5" class="mono stat">CUDA READY</text>
    </g>
    <g transform="translate(588,0)">
      <rect width="170" height="30" rx="15" fill="#0d1526" stroke="#1e3a5f"/>
      <circle cx="20" cy="15" r="4" fill="#38bdf8"><animate attributeName="opacity" values="1;.25;1" dur="1.4s" begin=".6s" repeatCount="indefinite"/></circle>
      <text x="34" y="19.5" class="mono stat">PY 3.10 – 3.13</text>
    </g>
    <g transform="translate(772,0)">
      <rect width="160" height="30" rx="15" fill="#0d1526" stroke="#1e3a5f"/>
      <circle cx="20" cy="15" r="4" fill="#a78bfa"><animate attributeName="opacity" values="1;.25;1" dur="1.4s" begin=".9s" repeatCount="indefinite"/></circle>
      <text x="34" y="19.5" class="mono stat">AI COPILOT</text>
    </g>
  </g>

  <!-- scanline -->
  <rect class="scan" x="0" y="0" width="1200" height="22" fill="#38bdf8" opacity="0.045"/>

  <!-- garis bawah aksen -->
  <rect x="0" y="427" width="1200" height="3" fill="url(#titleGrad)" opacity=".8"/>
</svg>
